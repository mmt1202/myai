name: Foundation Postgres Run Store

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres-run-store:
    name: Postgres run store contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: qwen-novel2drama-llm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Show CI profile
        run: python scripts/ci_profiles.py --profile postgres-run-store
      - name: Install dependencies
        run: python -m pip install -r requirements/postgres-run-store.txt
      - name: Run contract tests
        run: python -m unittest tests.test_postgres_run_store_contract
