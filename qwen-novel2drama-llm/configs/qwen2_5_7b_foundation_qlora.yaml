# Qwen2.5-7B Foundation QLoRA：通用本地大模型基座增强配置
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
stage: sft
do_train: true
do_eval: true
finetuning_type: lora
lora_target: all
template: qwen
dataset: foundation_base
eval_dataset: foundation_base_val
dataset_dir: datasets
cutoff_len: 2048
max_samples: 30000
overwrite_cache: true
preprocessing_num_workers: 4
output_dir: saves/qwen2_5_7b_foundation_qlora
overwrite_output_dir: true
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 0.0001
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.05
logging_steps: 10
save_steps: 100
save_total_limit: 3
eval_steps: 100
plot_loss: true
fp16: true
quantization_bit: 4
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
