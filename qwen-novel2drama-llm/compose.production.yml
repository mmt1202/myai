services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - configs/deploy/production.example.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    command: ["python", "inference/api_server.py", "--host", "0.0.0.0", "--port", "8000", "--skip-model-load"]
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; data=json.loads(urllib.request.urlopen('http://127.0.0.1:8000/v1/ready', timeout=3).read().decode()); raise SystemExit(0 if data.get('status') in {'ok','degraded'} else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - configs/deploy/production.example.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    command: ["python", "agent/worker_pool.py", "--project-root", ".", "--output-root", "outputs/agent_runtime/api", "--run-store", "postgres", "--worker-count", "2", "--max-runs-per-worker", "1", "--poll-seconds", "2", "--max-idle-iterations", "30"]
    profiles:
      - worker

  preflight:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "scripts/production_preflight.py"]
    profiles:
      - preflight

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/deploy/nginx.tls.example.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    profiles:
      - tls

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foundation
      POSTGRES_USER: foundation
      POSTGRES_PASSWORD: foundation_dev_change_me
    ports:
      - "5432:5432"
    volumes:
      - foundation-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundation -d foundation"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  foundation-postgres:
