openapi: 3.1.0
info:
  title: MyAI Foundation API
  version: 0.1.0
  description: Deployable AI foundation API for text, reasoning, multimodal, token/cost, memory, rules, skills, MCP and agent orchestration.
servers:
  - url: http://localhost:8000
paths:
  /v1/chat:
    post:
      summary: Unified text chat generation
      operationId: createChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoundationRequest'
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/reason:
    post:
      summary: Controlled reasoning and task decomposition
      operationId: createReasoning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoundationRequest'
      responses:
        '200':
          description: Reasoning response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/multimodal/analyze:
    post:
      summary: Analyze text, image, video, audio, file or URL content blocks
      operationId: analyzeMultimodal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoundationRequest'
      responses:
        '200':
          description: Multimodal analysis response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/token/count:
    post:
      summary: Count estimated tokens and multimodal billable units
      operationId: countTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoundationRequest'
      responses:
        '200':
          description: Token usage estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/cost/estimate:
    post:
      summary: Estimate model cost before execution
      operationId: estimateCost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoundationRequest'
      responses:
        '200':
          description: Cost estimate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/memory/search:
    post:
      summary: Search scoped memory
      operationId: searchMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryRequest'
      responses:
        '200':
          description: Memory search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/memory/write:
    post:
      summary: Write scoped memory
      operationId: writeMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryRequest'
      responses:
        '200':
          description: Memory write result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/rules/evaluate:
    post:
      summary: Evaluate routing, budget, provider, region and tool rules
      operationId: evaluateRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleRequest'
      responses:
        '200':
          description: Rule decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/skills/list:
    get:
      summary: List registered skills
      operationId: listSkills
      responses:
        '200':
          description: Skill list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/skills/call:
    post:
      summary: Call a registered skill
      operationId: callSkill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolLikeRequest'
      responses:
        '200':
          description: Skill call result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/mcp/tools:
    get:
      summary: List MCP tools/resources/prompts available through adapters
      operationId: listMcpTools
      responses:
        '200':
          description: MCP tool list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/agent/run:
    post:
      summary: Start an agent run
      operationId: runAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentRunRequest'
      responses:
        '200':
          description: Agent run response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
  /v1/jobs/{job_id}:
    get:
      summary: Get async job status
      operationId: getJob
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoundationResponse'
components:
  schemas:
    FoundationRequest:
      type: object
      required: [input]
      properties:
        request_id:
          type: string
        trace_id:
          type: string
        route_mode:
          type: string
          enum: [smart, cheap, balanced, local_first, cloud_first, drama_specialist, code_specialist]
        required_capabilities:
          type: array
          items:
            type: string
        input:
          type: array
          items:
            $ref: '#/components/schemas/ContentBlock'
        memory:
          type: object
          additionalProperties: true
        rules:
          type: object
          additionalProperties: true
        budget:
          type: object
          additionalProperties: true
        stream:
          type: boolean
          default: false
      additionalProperties: true
    ContentBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
        text:
          type: string
        uri:
          type: string
        file_id:
          type: string
        mime_type:
          type: string
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true
    FoundationResponse:
      type: object
      required: [request_id, status]
      properties:
        request_id:
          type: string
        trace_id:
          type: string
        status:
          type: string
          enum: [ok, queued, running, failed, cancelled]
        model:
          type: object
          additionalProperties: true
        usage:
          type: object
          additionalProperties: true
        cost:
          type: object
          additionalProperties: true
        output:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            type: string
        error:
          type: object
          additionalProperties: true
      additionalProperties: true
    MemoryRequest:
      type: object
      required: [scope]
      properties:
        scope:
          type: string
          enum: [session, user, project, task]
        key:
          type: string
        query:
          type: string
        item:
          type: object
          additionalProperties: true
      additionalProperties: true
    RuleRequest:
      type: object
      required: [subject, action]
      properties:
        subject:
          type: string
        action:
          type: string
        context:
          type: object
          additionalProperties: true
      additionalProperties: true
    ToolLikeRequest:
      type: object
      required: [name, arguments]
      properties:
        name:
          type: string
        arguments:
          type: object
          additionalProperties: true
      additionalProperties: true
    AgentRunRequest:
      type: object
      required: [task]
      properties:
        task:
          type: string
        input:
          type: array
          items:
            $ref: '#/components/schemas/ContentBlock'
        route_mode:
          type: string
        approval_policy:
          type: string
          enum: [never, on_write, on_cost, always]
      additionalProperties: true
